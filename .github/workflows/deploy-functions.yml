name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - "src/SemanticSearch.Functions/**"
      - "src/SemanticSearch.Core/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/SemanticSearch.Functions/SemanticSearch.Functions.csproj

      - name: Build
        run: dotnet build src/SemanticSearch.Functions/SemanticSearch.Functions.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/SemanticSearch.Functions.Tests/ --no-build -c Release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Publish Function App
        run: |
          dotnet publish src/SemanticSearch.Functions/SemanticSearch.Functions.csproj \
            -c Release -o ./publish/functions
          cd ./publish/functions && zip -r ../../functions.zip .

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}
          package: functions.zip
